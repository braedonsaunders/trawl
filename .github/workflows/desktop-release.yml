name: Desktop Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_date: ${{ steps.meta.outputs.release_date }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}
      commit_short: ${{ steps.meta.outputs.commit_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          timestamp="$(date -u +'%Y%m%d-%H%M%S')"
          release_date="$(date -u +'%Y-%m-%d %H:%M UTC')"
          commit_sha="$(git rev-parse HEAD)"
          commit_short="$(git rev-parse --short HEAD)"
          tag="v${version}-desktop-${timestamp}"
          release_name="Trawl Desktop ${version} (${release_date})"

          {
            echo "version=${version}"
            echo "tag=${tag}"
            echo "release_name=${release_name}"
            echo "release_date=${release_date}"
            echo "commit_sha=${commit_sha}"
            echo "commit_short=${commit_short}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop distributable
        run: pnpm desktop:dist

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: dist-electron/**/*
          if-no-files-found: error

  publish:
    name: Publish Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Build release notes
        shell: bash
        run: |
          cat <<EOF > release-notes.md
          Desktop release created from GitHub Actions.

          - Version: ${{ needs.prepare.outputs.version }}
          - Commit: ${{ needs.prepare.outputs.commit_short }} (${{ needs.prepare.outputs.commit_sha }})
          - Built: ${{ needs.prepare.outputs.release_date }}
          - Platforms: macOS, Windows, Linux

          Installers and metadata are attached below.
          EOF

      - name: Generate checksums
        shell: bash
        run: |
          find release-assets -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.7z' -o -name '*.blockmap' -o -name 'latest*.yml' \) \
            -print > asset-list.txt

          if [ ! -s asset-list.txt ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          while IFS= read -r file; do
            sha256sum "$file"
          done < asset-list.txt > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          assets=()
          while IFS= read -r file; do
            assets+=("$file")
          done < asset-list.txt
          assets+=("SHA256SUMS.txt")

          gh release create "${{ needs.prepare.outputs.tag }}" \
            "${assets[@]}" \
            --title "${{ needs.prepare.outputs.release_name }}" \
            --notes-file release-notes.md \
            --latest
